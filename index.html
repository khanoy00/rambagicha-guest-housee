header{

font-weight:bold;
}

/* HERO SLIDER */
.hero{
height:80vh;

.btn{

.call{background:#3b82f6;}
.whatsapp{background:#22c55e;}

/* FLOAT BUTTONS */
.float{
position:fixed;
right:15px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:1000;
}

.float a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
text-decoration:none;
}

.float .call{background:#3b82f6;}
.float .whatsapp{background:#22c55e;}

.rooms{
display:grid;
grid-template-columns:1fr;
padding:10px;
}

.room{

overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);

border-top-right-radius:25px;
}

.room h3{
text-align:center;
margin:15px 0 5px;
font-size:20px;
font-weight:600;
}

.price{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.features{
display:flex;
justify-content:space-around;
font-size:15px;
margin:15px 0;
color:#555;
}

.room-buttons{
display:flex;
gap:10px;
padding:0 15px;
}

.room-buttons a{
flex:1;
text-align:center;
padding:12px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

footer{
background:black;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}
